name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Pruebas unitarias e integración
        run: pnpm test

      - name: Instalar Chromium para Playwright
        run: pnpm --filter @anima/web exec playwright install chromium --with-deps

      # Playwright levanta la web y una API con base en memoria; sin CLI de
      # Codex en el runner, el puente informa installed:false y los E2E de
      # Codex usan intercepción — no se consume ninguna cuenta real.
      - name: Pruebas E2E
        run: pnpm test:e2e
        env:
          ANIMA_DB: ':memory:'

      - name: Reporte de Playwright en fallos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/test-results/
          retention-days: 7
